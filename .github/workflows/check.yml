name: Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Dependency policy (if configured)
        run: |
          if bun -e 'import { readFileSync } from "node:fs"; const p = JSON.parse(readFileSync("package.json", "utf8")); process.exit(p.scripts?.["deps:policy"] ? 0 : 1)'; then
            bun run deps:policy
          else
            echo "No deps:policy script configured; skipping"
          fi
      - name: Build (if configured)
        run: |
          if bun -e 'import { readFileSync } from "node:fs"; const p = JSON.parse(readFileSync("package.json", "utf8")); process.exit(p.scripts?.build ? 0 : 1)'; then
            bun run build
          else
            echo "No root build script configured; skipping"
          fi
