name: Fabrik CLI Verify

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  verify-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/fabrik-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Verify CLI unit/command pipeline
        run: go test ./...

  verify-cli-k3d:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: Create k3d single-node cluster
        run: scripts/k3d/cluster.sh create single dev
      - name: Verify k3d single-node cluster
        run: scripts/k3d/cluster.sh verify single dev
      - name: Run k3d-gated Fabrik CLI integration test
        run: cd src/fabrik-cli && FABRIK_K3D_E2E=1 go test ./internal/run -run TestK3dRenderAndDryRun -v
