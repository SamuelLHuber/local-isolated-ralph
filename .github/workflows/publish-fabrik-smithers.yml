name: Publish Fabrik Smithers Image

on:
  push:
    branches: [main, master]
    paths:
      - 'k8s/Dockerfile'
      - 'k8s/smithers-runtime/**'
      - '.github/workflows/publish-fabrik-smithers.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          ref_name="${GITHUB_REF_NAME//\//-}"
          echo "image=ghcr.io/${owner}/fabrik-smithers" >> "$GITHUB_OUTPUT"
          echo "ref_tag=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: k8s/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
