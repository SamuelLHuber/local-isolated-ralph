name: PR Check

on:
  pull_request:
    branches: [master]

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: git fetch origin master:master
      - run: bun install --frozen-lockfile
      - name: Dependency policy (if configured)
        run: |
          if bun -e 'import { readFileSync } from "node:fs"; const p = JSON.parse(readFileSync("package.json", "utf8")); process.exit(p.scripts?.["deps:policy"] ? 0 : 1)'; then
            bun run deps:policy
          else
            echo "No deps:policy script configured; skipping"
          fi
      - run: bunx changeset status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
