name: Release fabrik

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/fabrik-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build binary
        env:
          FABRIK_RAW_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
          FABRIK_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p ../../dist
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          FABRIK_VERSION="${FABRIK_RAW_VERSION#v}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
              -ldflags "-X fabrik-cli/cmd.Version=${FABRIK_VERSION} -X fabrik-cli/cmd.Commit=${FABRIK_COMMIT} -X fabrik-cli/cmd.BuildDate=${BUILD_DATE}" \
              -o ../../dist/fabrik-${{ matrix.suffix }} \
              .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabrik-${{ matrix.suffix }}
          path: dist/fabrik-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare files
        run: |
          mkdir -p release-dist
          find dist -type f -maxdepth 2 -name "fabrik-*" -print -exec cp {} release-dist/ \;
          (
            cd release-dist
            sha256sum fabrik-* > fabrik-sha256.txt
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            release-dist/*
