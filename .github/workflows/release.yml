name: Release fabrik

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  validate-release-target:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      should_publish: ${{ steps.validate.outputs.should_publish }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release target
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid release tag: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "prerelease=false" >> "$GITHUB_OUTPUT"
          git fetch origin master --depth=1

          TARGET_COMMIT="${GITHUB_SHA}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TARGET_COMMIT="$(git rev-list -n 1 "$TAG")"
          fi

          if git merge-base --is-ancestor "$TARGET_COMMIT" origin/master; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Stable tag $TAG is not reachable from origin/master; skipping release." >&2
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: validate-release-target
    if: needs.validate-release-target.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/fabrik-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build binary
        env:
          FABRIK_RAW_VERSION: ${{ needs.validate-release-target.outputs.tag }}
          FABRIK_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p ../../dist
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          FABRIK_VERSION="${FABRIK_RAW_VERSION#v}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
              -ldflags "-X fabrik-cli/cmd.Version=${FABRIK_VERSION} -X fabrik-cli/cmd.Commit=${FABRIK_COMMIT} -X fabrik-cli/cmd.BuildDate=${BUILD_DATE}" \
              -o ../../dist/fabrik-${{ matrix.suffix }} \
              .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabrik-${{ matrix.suffix }}
          path: dist/fabrik-${{ matrix.suffix }}

  release:
    needs:
      - validate-release-target
      - build
    if: needs.validate-release-target.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare files
        run: |
          mkdir -p release-dist
          find dist -type f -maxdepth 2 -name "fabrik-*" -print -exec cp {} release-dist/ \;
          (
            cd release-dist
            sha256sum fabrik-* > fabrik-sha256.txt
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-target.outputs.tag }}
          prerelease: ${{ needs.validate-release-target.outputs.prerelease == 'true' }}
          files: |
            release-dist/*
