name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fabrik-runtime unit tests (no jj binary required)
        run: |
          bun test \
            ./src/fabrik-runtime/src/codex-auth.test.ts \
            ./src/fabrik-runtime/src/codex-auth-telemetry.test.ts \
            ./src/fabrik-runtime/src/credential-pool.test.ts
