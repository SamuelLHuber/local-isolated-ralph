apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabrik-runner
  namespace: fabrik-runs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fabrik-runner
  namespace: fabrik-runs
rules:
  # Core permissions for running Fabrik jobs
  # pods/delete is required for `fabrik run resume` to delete stuck pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secrets access for project environment
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps for workflow bundles
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding for the primary fabrik-runner service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fabrik-runner
  namespace: fabrik-runs
subjects:
  - kind: ServiceAccount
    name: fabrik-runner
    namespace: fabrik-runs
roleRef:
  kind: Role
  name: fabrik-runner
  apiGroup: rbac.authorization.k8s.io
---
# RoleBinding for all service accounts in fabrik-runs namespace
# This allows in-cluster verification workflows to use `fabrik run resume`
# Uses both Group binding for comprehensive coverage
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fabrik-runner-verifiers
  namespace: fabrik-runs
subjects:
  - kind: Group
    name: system:serviceaccounts:fabrik-runs
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: fabrik-runner
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for namespace-level permissions (optional, for cross-namespace scenarios)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fabrik-runner-readonly
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
# ClusterRoleBinding for readonly namespace access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fabrik-runner-readonly
subjects:
  - kind: ServiceAccount
    name: fabrik-runner
    namespace: fabrik-runs
  - kind: Group
    name: system:serviceaccounts:fabrik-runs
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: fabrik-runner-readonly
  apiGroup: rbac.authorization.k8s.io
