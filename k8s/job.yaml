apiVersion: batch/v1
kind: Job
metadata:
  name: smithers-local-run
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smithers
          image: fabrik-smithers:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: SMITHERS_RUN_ID
              value: "k3d-local"
            - name: SMITHERS_INPUT_JSON
              value: "{}"
            - name: SMITHERS_RUNTIME_DIR
              value: "/opt/smithers-runtime"
            - name: SMITHERS_WORKDIR
              value: "/workspace/workdir"
            - name: SMITHERS_DB_PATH
              value: "/workspace/.smithers/state.db"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: codex-auth
              mountPath: /root/.codex/auth.json
              subPath: auth.json
              readOnly: true
            - name: codex-auth
              mountPath: /root/.codex/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: smithers-workspace-pvc
        - name: codex-auth
          secret:
            secretName: codex-auth
            defaultMode: 0400
