apiVersion: batch/v1
kind: Job
metadata:
  name: smithers-local-run
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smithers
          image: fabrik-smithers:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: SMITHERS_RUN_ID
              value: "k3d-local"
            - name: SMITHERS_INPUT_JSON
              value: "{}"
            - name: SMITHERS_RUNTIME_DIR
              value: "/opt/smithers-runtime"
            - name: SMITHERS_WORKDIR
              value: "/workspace/workdir"
            - name: SMITHERS_DB_PATH
              value: "/workspace/.smithers/state.db"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: fabrik-credentials
              mountPath: /etc/fabrik/credentials
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: smithers-workspace-pvc
        - name: fabrik-credentials
          secret:
            secretName: fabrik-credentials
            defaultMode: 0400
            optional: true
